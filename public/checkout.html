<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GameVault | Secure Checkout</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" style="text-decoration: none;"><h1 class="logo">GAME<span>VAULT</span></h1></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="orders.html">Orders</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" style="display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-top: 40px;">
    <section class="checkout-details" style="background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d;">
        <h2 style="color: #00ff88; margin-bottom: 20px;">Review Your Gear</h2>
        <div id="product-summary" style="display: flex; gap: 20px; align-items: center;">
            <img id="checkout-img" src="" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #333;">
            <div>
                <h3 id="checkout-name" style="font-size: 1.5rem; margin-bottom: 10px;">Loading...</h3>
                <p id="checkout-desc" style="color: #8b949e; line-height: 1.5; font-size: 0.9rem;">Product description will appear here.</p>
                <p style="margin-top: 10px; color: #00ff88;">✓ In Stock & Ready to Ship</p>
            </div>
        </div>
    </section>

    <section class="order-total" style="background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; height: fit-content;">
        <h3 style="margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px;">Order Summary</h3>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Subtotal</span>
            <span id="subtotal">0.00€</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Shipping</span>
            <span style="color: #00ff88;">FREE</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; border-top: 1px solid #30363d; padding-top: 15px; margin-top: 15px;">
        <span>Total</span>
            <span id="amount" style="color: #00ff88;">0.00€</span>
        </div>
        
        <button id="stripe-pay-btn" onclick="handleStripePayment()" class="buy-btn" style="background: #6772e5; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s;">
            PROCEED TO SECURE PAYMENT
        </button>
        <p style="text-align: center; font-size: 0.7rem; color: #8b949e; margin-top: 15px;">🔒 Encrypted SSL Transaction</p>
    </section>
</main>

    <script>
        const stripe = Stripe('pk_test_51TBaAUH0zAQ0spyz8cMK7DckEjgXSSMaSwIIZ3Pj3p7YRCKFQZ4BATl9to7lqVpzP8WIjfjRWJnAyJubBjnX0u1A00jpCpg3NQ');
        
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id'); 
        const productPrice = parseFloat(urlParams.get('price') || "49.99").toFixed(2); 

        document.getElementById('amount').innerText = `${productPrice}€`;

        
        async function loadCheckoutDetails() {
            try {
                const res = await fetch(`/api/products`);
                const products = await res.json();
                
                
                const product = products.find(p => p._id === productId);

                if(product) {
                    document.getElementById('checkout-name').innerText = product.name;
                    document.getElementById('checkout-desc').innerText = product.description || "High-performance gaming component verified for quality.";
                    document.getElementById('checkout-img').src = product.image || 'https://via.placeholder.com/150';
                    document.getElementById('subtotal').innerText = `${productPrice}€`;
                }
            } catch (err) {
                console.error("Critical: Failed to resolve checkout metadata:", err);
            }
        }

        
        async function handleStripePayment() {
            try {
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        productName: document.getElementById('checkout-name').innerText, 
                        price: productPrice, 
                        productId: productId 
                    })
                });
                const session = await response.json();
                if (session.id) { 
                    await stripe.redirectToCheckout({ sessionId: session.id }); 
                }
            } catch (err) {
                console.error("Stripe redirect error:", err);
            }
        }

        loadCheckoutDetails();
    </script>
</body>
</html>
