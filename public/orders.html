<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GameVault | Order History</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .vault-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: 'Inter', sans-serif;
        }

        .vault-card {
            background: #161b22 !important;
            border: 1px solid #30363d !important;
            border-radius: 12px !important;
            padding: 25px !important;
            margin-bottom: 20px !important;
            display: block !important;
            width: 100% !important;
            text-align: left !important;
        }

        .vault-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid #30363d !important;
            padding-bottom: 15px !important;
            margin-bottom: 15px !important;
        }

        .vault-ref { color: #00ff88; font-family: monospace; font-size: 1.1rem; margin: 0; }
        .vault-label { color: #8b949e; font-size: 0.7rem; text-transform: uppercase; display: block; }

        .vault-body {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .vault-item-info { display: flex; align-items: center; gap: 20px; }
        .vault-icon { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 1.5rem; 
            border: 1px solid #30363d;
        }

        .vault-price-box { text-align: right; }
        .vault-total { font-size: 1.8rem; font-weight: 800; color: #fff; margin: 0; }
        
        .vault-status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        
        .vault-stats { display: flex; gap: 20px; margin-bottom: 40px; }
        .vault-stat-item {
            flex: 1;
            background: #0d1117;
            border: 1px solid #00ff88;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" style="text-decoration: none;"><h1 class="logo">GAME<span>VAULT</span></h1></a>
            <ul class="nav-links">
                <li><a href="index.html">Shop</a></li>
                <li><a href="add-product.html">Admin</a></li>
            </ul>
        </nav>
    </header>

    <div class="vault-container">
        <div class="vault-stats">
            <div class="vault-stat-item">
                <span class="vault-label">Total Revenue</span>
                <p id="total-revenue" style="font-size: 2rem; color: #fff; margin: 5px 0 0 0;">0.00€</p>
            </div>
            <div class="vault-stat-item">
                <span class="vault-label">Orders Processed</span>
                <p id="total-orders" style="font-size: 2rem; color: #fff; margin: 5px 0 0 0;">0</p>
            </div>
        </div>

        <h2 style="margin-bottom: 25px; letter-spacing: 1px;">Transaction <span style="color: #00ff88;">Log</span></h2>
        <div id="order-list">
             </div>
    </div>

    <script>
        async function finalizeStripeOrder() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('success') === 'true') {
                const pId = params.get('id');
                const pPrice = params.get('price');
                if (sessionStorage.getItem('processed_' + pId)) return;

                await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderItems: [{ name: "Vault Hardware", qty: 1, price: pPrice, product: pId }],
                        totalPrice: pPrice,
                        paymentResult: { id: 'GV-' + Math.random().toString(36).substr(2, 6).toUpperCase(), status: 'PAID' },
                        isPaid: true
                    })
                });
                sessionStorage.setItem('processed_' + pId, 'true');
            }
        }

        async function loadOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            const list = document.getElementById('order-list');
            
            const total = orders.reduce((sum, o) => sum + parseFloat(o.totalPrice), 0);
            document.getElementById('total-revenue').innerText = `${total.toFixed(2)}€`;
            document.getElementById('total-orders').innerText = orders.length;

            list.innerHTML = orders.reverse().map(o => `
                <div class="vault-card">
                    <div class="vault-header">
                        <div>
                            <span class="vault-label">Order Ref</span>
                            <h4 class="vault-ref">${o.paymentResult.id}</h4>
                        </div>
                        <div style="text-align: right;">
                            <span class="vault-status-badge">PAID & VERIFIED</span>
                            <p style="color: #8b949e; font-size: 0.7rem; margin-top: 5px;">${new Date(o.createdAt).toLocaleDateString()}</p>
                        </div>
                    </div>
                    
                    <div class="vault-body">
                        <div class="vault-item-info">
                            <div class="vault-icon">🚀</div>
                            <div>
                                <p style="margin: 0; font-weight: bold; font-size: 1.1rem;">${o.orderItems[0].name}</p>
                                <p style="margin: 0; color: #8b949e; font-size: 0.8rem;">Standard Secure Shipping</p>
                            </div>
                        </div>
                        <div class="vault-price-box">
                            <p class="vault-total">${o.totalPrice}€</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    
        finalizeStripeOrder().then(loadOrders);
    </script>
</body>
</html>
